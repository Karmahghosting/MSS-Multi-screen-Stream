name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.2.0). Leave empty to skip release upload.'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev libxcb-render0-dev \
            libxcb-randr0-dev libxcb-shm0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libgtk-3-dev libssl-dev libwayland-dev \
            libfontconfig1-dev pkg-config \
            libgl1-mesa-dev libegl1-mesa-dev \
            libxi-dev libxinerama-dev libxcursor-dev libxrandr-dev
          # Disable rustc's "self-contained" linker bundle. Without this,
          # rustc passes -B<sysroot>/lib/rustlib/.../gcc-ld to cc, and inside
          # that dir `ld`, `ld.lld`, `ld.gold`, `ld.bfd` are all symlinks to
          # rust-lld. rust-lld doesn't search /usr/lib/x86_64-linux-gnu by
          # default, so it can't find libxcb-randr.so even when the dev
          # package is installed. Turning self-contained off makes cc fall
          # back to the system GNU ld, which honours gcc's specs.
          echo "RUSTFLAGS=-C link-self-contained=no" >> "$GITHUB_ENV"

      - name: Diagnose Linux link environment
        if: runner.os == 'Linux'
        run: |
          set +e
          echo "## Linux link diagnostics" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "--- which ld ---"          | tee -a "$GITHUB_STEP_SUMMARY"
          which ld; ld --version | head -1  | tee -a "$GITHUB_STEP_SUMMARY"
          echo "--- libxcb-randr files ---" | tee -a "$GITHUB_STEP_SUMMARY"
          dpkg -L libxcb-randr0-dev | grep -E '\.so($|\.)|pkgconfig' | tee -a "$GITHUB_STEP_SUMMARY"
          echo "--- /usr/lib multiarch xcb ---" | tee -a "$GITHUB_STEP_SUMMARY"
          ls -la /usr/lib/x86_64-linux-gnu/libxcb-randr* | tee -a "$GITHUB_STEP_SUMMARY"
          echo "--- pkg-config ---"        | tee -a "$GITHUB_STEP_SUMMARY"
          pkg-config --libs xcb-randr | tee -a "$GITHUB_STEP_SUMMARY"
          echo "--- RUSTFLAGS ---"         | tee -a "$GITHUB_STEP_SUMMARY"
          echo "$RUSTFLAGS"                | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Build (unix, with log capture)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -o pipefail
          mkdir -p /tmp/buildlog
          cargo build --release --locked --target ${{ matrix.target }} --verbose 2>&1 | tee /tmp/buildlog/build.log

      - name: Build (windows)
        if: runner.os == 'Windows'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Publish build log to step summary on failure
        if: failure() && runner.os != 'Windows'
        shell: bash
        run: |
          {
            echo "## Build failure log (\`${{ matrix.target }}\`)"
            echo ""
            echo '```'
            tail -n 300 /tmp/buildlog/build.log || echo "(no log captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build log artifact on failure
        if: failure() && runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.target }}
          path: /tmp/buildlog/build.log
          if-no-files-found: ignore

      - name: Stage artifact (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          tag="${tag:-dev}"
          name="mss-${tag}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/p2p-screenshare" "dist/$name/"
          cp README.md "dist/$name/"
          (cd dist && tar -czf "$name.tar.gz" "$name")
          ls -la dist

      - name: Stage artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "$env:GITHUB_REF_NAME"
          if (-not $tag) { $tag = "${{ inputs.tag }}" }
          if (-not $tag) { $tag = "dev" }
          $name = "mss-$tag-${{ matrix.target }}"
          New-Item -ItemType Directory -Force "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/p2p-screenshare.exe" "dist/$name/"
          Copy-Item README.md "dist/$name/"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
          Get-ChildItem dist

      - uses: actions/upload-artifact@v4
        with:
          name: mss-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
