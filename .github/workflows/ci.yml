name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: cargo check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev libxcb-render0-dev \
            libxcb-randr0-dev libxcb-shm0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libgtk-3-dev libssl-dev libwayland-dev \
            libfontconfig1-dev pkg-config \
            libgl1-mesa-dev libegl1-mesa-dev \
            libxi-dev libxinerama-dev libxcursor-dev libxrandr-dev
          # See release.yml: force system ld so rust-lld doesn't hide the
          # multiarch lib path on Ubuntu.
          echo "RUSTFLAGS=-C link-arg=-fuse-ld=ld -L /usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - run: cargo check --all-targets --locked

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
        continue-on-error: true

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev libxcb-render0-dev \
            libxcb-randr0-dev libxcb-shm0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libgtk-3-dev libssl-dev libwayland-dev \
            libfontconfig1-dev pkg-config \
            libgl1-mesa-dev libegl1-mesa-dev \
            libxi-dev libxinerama-dev libxcursor-dev libxrandr-dev
          echo "RUSTFLAGS=-C link-arg=-fuse-ld=ld -L /usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"
      - run: cargo clippy --all-targets --locked -- -D warnings
        continue-on-error: true
